 <!DOCTYPE html>
<html>

<head>
<title>Sales Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1 style="text-align:center;">Sales Prediction Using Machine Learning</h1>
<p style="text-align:center;">Enter advertising budget to predict future sales</p>

<form action="/predict" method="post">

<input type="text" name="TV" placeholder="TV Advertising Budget" required>

<input type="text" name="Radio" placeholder="Radio Advertising Budget" required>

<input type="text" name="Newspaper" placeholder="Newspaper Advertising Budget" required>

<br>

<button type="submit">Predict Sales</button>

</form>

<div class="result">

<h2 style="color:green; text-align:center;">
{{ prediction_text }}
</h2>

</div>

{% if show_graph %}
<img src="{{ url_for('static', filename=graph_image) }}" width="400">
{% endif %}

</div>

</body>


</html>
